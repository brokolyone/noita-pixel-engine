name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Download and Build Raylib for Android
      run: |
        git clone --depth 1 https://github.com/raysan5/raylib.git raylib_src
        cd raylib_src/src
        make PLATFORM=PLATFORM_ANDROID ANDROID_NDK=$ANDROID_NDK_ROOT ANDROID_ARCH=arm64 ANDROID_API=24
        mkdir -p ../../lib/arm64-v8a
        cp libraylib.a ../../lib/arm64-v8a/
        cd ../..

    - name: Build with Gradle
      run: |
        cd platforms/android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: noita-engine-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
