plugins {
    id 'com.android.application'
}

android {
    namespace "com.noita.pixelengine"
    compileSdk 34

    defaultConfig {
        applicationId "com.noita.pixelengine"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "1.1"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                arguments "-DPLATFORM=Android", "-DANDROID_STL=c++_static"
            }
        }

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
